<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Gra - Luki</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        h2 {
            color: #34495e;
            margin-top: 30px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            resize: none;
        }

        button {
            margin-top: 10px;
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            background: #3498db;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background: #2980b9;
        }

        .box {
            background: #f9fafc;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #e1e4e8;
        }

        .score {
            font-size: 20px;
            font-weight: bold;
            color: #27ae60;
            margin-top: 10px;
        }

        ul {
            padding-left: 20px;
        }

        li {
            margin-bottom: 5px;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #aaa;
            font-size: 12px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🎮 Gra: Uzupełnij luki</h1>

    <h2>1. Wklej tekst</h2>

    <form method="post">
        <textarea name="tekst" rows="6" placeholder="Wklej tekst tutaj..."></textarea>
        <br>
        <button type="submit">🎯 Generuj grę</button>
    </form>

    <h2>📄 Tekst z lukami</h2>
    <div class="box">
        <p>{{ wynik }}</p>
    </div>

    <h2>2. Twoje odpowiedzi</h2>

    <form method="post">
        <textarea name="odpowiedzi" rows="3" placeholder="Wpisz brakujące słowa po kolei..."></textarea>
        <br>
        <button type="submit">✔ Sprawdź wynik</button>
    </form>

    {% if score %}
        <div class="score">{{ score }}</div>
    {% endif %}

    <h2>📊 Szczegóły</h2>
    <div class="box">
        <ul>
            {% for f in feedback %}
                <li>{{ f }}</li>
            {% endfor %}
        </ul>
    </div>

    <div class="footer">
        Twoja mini gra edukacyjna 🚀
    </div>

</div>

</body>
</html>
